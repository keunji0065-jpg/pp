                        <div className="p-2 bg-white text-center font-bold text-gray-700 text-xs border-t border-gray-200">총 입금: <span className="text-green-600">{totalDepositAmount.toLocaleString()}</span>원</div>
                    </div>
                    
                    <div className="w-[50%] bg-white border rounded-lg flex flex-col overflow-hidden shadow-sm">
                        <div className="grid grid-cols-4 gap-2 p-2 bg-indigo-50 border-b border-indigo-100 text-center text-xs">
                            <div onClick={()=>setFilterStatus('all')} className={`bg-white p-1 rounded shadow-sm cursor-pointer border-2 transition-all ${filterStatus==='all' ? 'border-indigo-500' : 'border-transparent hover:border-indigo-200'}`}><div className="text-gray-400">총 매출</div><div className="font-bold text-indigo-700">{dashboardStats.totalSales.toLocaleString()}</div></div>
                            <div onClick={()=>setFilterStatus('paid')} className={`bg-white p-1 rounded shadow-sm cursor-pointer border-2 transition-all ${filterStatus==='paid' ? 'border-green-500' : 'border-transparent hover:border-green-200'}`}><div className="text-gray-400">입금액</div><div className="font-bold text-green-600">{dashboardStats.totalDeposit.toLocaleString()}</div></div>
                            <div onClick={()=>setFilterStatus('unpaid')} className={`bg-white p-1 rounded shadow-sm cursor-pointer border-2 transition-all ${filterStatus==='unpaid' ? 'border-red-500' : 'border-transparent hover:border-red-200'}`}><div className="text-gray-400">미수금</div><div className="font-bold text-red-500">{dashboardStats.totalUnpaid.toLocaleString()}</div></div>
                            <div onClick={()=>setFilterStatus('card')} className={`bg-white p-1 rounded shadow-sm cursor-pointer border-2 transition-all ${filterStatus==='card' ? 'border-purple-500' : 'border-transparent hover:border-purple-200'}`}><div className="text-gray-400">카드예정</div><div className="font-bold text-purple-600">{dashboardStats.totalCardExpected.toLocaleString()}</div></div>
                        </div>
                        <div className="p-2 bg-white border-b font-bold text-indigo-700 shadow-sm flex flex-col gap-2">
                             <div className="flex justify-between items-center"><span className="text-sm">📦 주문서 ({filteredGroupedOrders.length}명) ({totalItemsCount}건)</span><div className="flex items-center gap-2"><button onClick={handleLoadOrders} className="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold flex items-center gap-1 shadow-sm"><Icon name="cloud-arrow-down" weight="fill"/> 불러오기</button><button onClick={resetAllStatus} className="bg-rose-500 text-white px-2 py-1 rounded text-xs font-bold hover:bg-rose-600 flex items-center gap-1" title="초기화"><Icon name="trash" weight="fill"/> 초기화</button><div className={`px-2 py-1 rounded text-xs font-bold flex items-center gap-1 ${isSaving ? 'bg-indigo-100 text-indigo-700' : 'bg-green-100 text-green-700'}`}>{isSaving ? <Icon name="spinner" className="animate-spin" /> : <Icon name="cloud-check" weight="fill" />} {isSaving ? "저장중" : "자동저장"}</div></div></div>
                             <div className="flex gap-2 items-center">
                                 <div className="flex-1 flex gap-1 items-center bg-indigo-50 p-1 rounded border border-indigo-100"><span className="text-xs font-bold text-indigo-600 whitespace-nowrap pl-1">🖐️</span>
                                 <form onSubmit={handleManualSubmit} className="flex gap-1 w-full">
                                    <input type="text" placeholder="닉네임" value={manualNick} onChange={e => setManualNick(e.target.value)} className="w-20 border rounded px-2 py-1 text-xs outline-none" />
                                    <input type="text" list="product-list" placeholder="상품명" value={manualProduct} onChange={e => { setManualProduct(e.target.value); setCurrentSearchTerm(e.target.value); }} className="flex-1 border rounded px-2 py-1 text-xs outline-none" />
                                    <button type="submit" className="bg-indigo-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-indigo-700">＋</button>
                                </form>
                                </div><div className="w-32 relative"><Icon name="magnifying-glass" className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs"/><input type="text" placeholder="검색..." value={orderSearch} onChange={(e) => setOrderSearch(e.target.value)} className="w-full pl-6 pr-2 py-1 border rounded text-xs outline-none" />{orderSearch && <button onClick={()=>setOrderSearch('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><Icon name="x-circle" weight="fill" size={10}/></button>}</div></div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-100">
                             {filteredGroupedOrders.map(([nick, items]) => {
                                 const isSelected = selectedNick === nick;
                                 const currentShipping = shippingOverrides[nick] !== undefined ? shippingOverrides[nick] : Number(quickShipping);
                                 const activeItems = items.filter(i => !i.isCancelled);
                                 const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0);
                                 const grandTotal = productTotal + (activeItems.length > 0 ? currentShipping : 0);
                                 const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0);
                                 const balance = grandTotal - depositTotal;
                                 const isCard = cardPayments[nick];
                                 const isPaidState = (balance <= 0 && grandTotal >= 0 && activeItems.length > 0);
                                 const isOrderConfirmed = checkedOrders?.has(nick) || false;
                                 const isEditingShipping = editingShippingNick === nick;
                                 const depositorName = depositorNames[nick];
                                 const addr = findAddress(nick);
                                 const suggestions = findAddressSuggestions(nick);
                                 let borderClass = 'border-transparent';
                                 let headerBgClass = 'bg-white';
                                 if (isCard) { borderClass = 'border-purple-200 ring-1 ring-purple-200'; headerBgClass = 'bg-purple-50'; } 
                                 else if (!isPaidState && balance > 0) { borderClass = 'border-red-200 ring-1 ring-red-200'; headerBgClass = 'bg-red-50'; } 
                                 else if (balance < 0 && !isCard) { borderClass = 'border-blue-200 ring-1 ring-blue-200'; headerBgClass = 'bg-blue-50'; } 
                                 else if (isPaidState) { borderClass = 'border-gray-200'; headerBgClass = 'bg-white'; } 
                                 if (isSelected) { headerBgClass = 'bg-indigo-50'; borderClass = 'border-indigo-400 ring-1 ring-indigo-400 shadow-md'; }
                                 return (<div key={nick} onClick={() => setSelectedNick(prev => prev === nick ? null : nick)} className={`bg-white rounded shadow-sm transition-all overflow-hidden cursor-pointer ${borderClass} border`}>
                                    <div className={`px-2 py-1.5 flex justify-between items-center border-b border-gray-100 ${headerBgClass}`}>
                                     <div className="flex flex-col gap-0.5">
                                         <div className="flex items-center gap-2">
                                            <span className={`font-bold text-sm text-gray-900`}>{nick}</span>
                                            {renderSpecialBadge(nick)}
                                            <button onClick={(e) => { e.stopPropagation(); addOrderLogic(nick, '', 1); }} className="bg-indigo-100 text-indigo-700 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold hover:bg-indigo-200" title="빈 상품줄 추가">+</button>
                                            <button onClick={(e)=>{e.stopPropagation(); handleNicknameEdit(nick);}} className="text-gray-300 hover:text-indigo-600" title="닉네임 수정"><Icon name="pencil-simple" weight="bold" size={12}/></button>
                                            <button onClick={(e) => { e.stopPropagation(); toggleCardPayment(nick); }} className={`ml-1 text-[10px] px-1.5 py-0.5 rounded border transition-colors ${isCard ? 'bg-purple-100 border-purple-300 text-purple-700 font-bold' : 'bg-white text-gray-400 hover:bg-gray-100'}`}>카드</button>
                                            <div onClick={(e) => e.stopPropagation()} className="ml-1">
                                                {isEditingShipping ? (
                                                    <div className="flex items-center gap-1 bg-white border border-indigo-300 rounded px-1 py-0.5 shadow-sm"><Icon name="truck" className="text-indigo-600 text-[10px]"/><input type="number" value={currentShipping} onChange={(e) => handleShippingChange(nick, e.target.value)} onBlur={() => setEditingShippingNick(null)} onKeyDown={(e) => { if(e.key === 'Enter') setEditingShippingNick(null); }} autoFocus onFocus={(e) => e.target.select()} className="w-12 text-[10px] outline-none font-mono text-right text-indigo-600 font-bold bg-transparent"/></div>
                                                ) : (
                                                    <div onClick={() => setEditingShippingNick(nick)} className="cursor-pointer flex items-center gap-1 text-[10px] text-gray-500 bg-white px-1.5 py-0.5 rounded border hover:bg-indigo-50 hover:text-indigo-600 transition-colors" title="클릭하여 배송비 수정">
                                                        <Icon name="truck" weight="fill"/> <span>{currentShipping.toLocaleString()}</span>
                                                    </div>
                                                )}
                                            </div>
                                            <div onClick={(e) => { e.stopPropagation(); openModal(`'${nick}'님의 입금자명(실명)을 입력하세요.`, 'prompt', (newName) => { if(newName !== null) setDepositorNames(prev => ({...prev, [nick]: newName})); }, null, depositorName || ''); }} className={`cursor-pointer flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded border hover:bg-indigo-50 transition-colors ml-1 ${depositorName ? 'bg-indigo-50 text-indigo-600 border-indigo-200' : 'bg-white text-gray-400'}`} title="실명 입금자 등록">
                                                <Icon name="user" weight={depositorName ? "fill" : "regular"}/> <span>{depositorName || '입금자'}</span>
                                            </div>
                                            <div onClick={(e) => { e.stopPropagation(); handleFullDepositToggle(nick, grandTotal, depositTotal); }} className={`cursor-pointer ml-1 flex items-center gap-1 px-1.5 py-0.5 rounded border transition-colors ${isPaidState ? 'bg-green-500 border-green-600 text-white shadow-inner' : 'bg-white border-gray-200 text-gray-400 hover:bg-gray-100'}`} title={isPaidState ? "입금 완료됨 (클릭시 취소)" : "클릭시 전액 입금 처리"}>
                                                <Icon name={isPaidState ? "toggle-right" : "toggle-left"} weight="fill" size={16} />
                                                <span className="text-[10px] font-bold">{isPaidState ? "완납" : "미납"}</span>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); copyOrderSheet(nick, items, grandTotal, depositTotal, balance, isCard); }} className={`ml-1 flex items-center gap-1 px-2 py-0.5 rounded border transition-colors ${copyStatus[nick] ? 'bg-green-100 border-green-300 text-green-700' : 'bg-yellow-300 border-yellow-400 text-yellow-900 hover:bg-yellow-400'}`} title="주문서 카톡 복사">
                                                <Icon name={copyStatus[nick] ? "check" : "chat-circle-dots"} weight="fill" size={16}/>
                                                <span className="text-[10px] font-bold">카톡</span>
                                            </button>
                                            <div onClick={(e) => { e.stopPropagation(); handleOrderCheckToggle(nick); }} className="ml-1 cursor-pointer flex items-center" title="주문 확인 체크">
                                                <input type="checkbox" checked={isOrderConfirmed} readOnly className="custom-checkbox" />
                                            </div>
                                         </div>
                                         <div className="flex flex-col items-start gap-1 text-xs mt-1">
                                             {addr ? (
                                                 <span className="text-green-600 text-[10px] flex items-center gap-1">
                                                     <Icon name="house-line" weight="fill"/> {addr.realname} ({addr.phone})
                                                     {addressMapping[nick] && <button onClick={(e) => {e.stopPropagation(); handleAddressUnmapping(nick);}} className="text-gray-400 hover:text-red-500 ml-1" title="주소 연결 해제"><Icon name="link-break" weight="bold"/></button>}
                                                 </span>
                                             ) : (
                                                 <div className="flex items-center gap-1">
                                                    <span className="text-red-300 text-[10px] flex items-center gap-1"><Icon name="warning-circle" weight="fill"/> 주소없음</span>
                                                    <button onClick={(e) => { e.stopPropagation(); openModal("연결할 주소록의 닉네임을 입력하세요.", "prompt", (targetNick) => { if(targetNick) handleAddressMapping(nick, targetNick); }); }} className="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded border border-gray-300 hover:bg-gray-200 flex items-center gap-1"><Icon name="link" weight="bold" /> 연결</button>
                                                    {suggestions.length > 0 && (<div className="flex flex-wrap gap-1 items-center bg-orange-50 px-1 py-0.5 rounded"><span className="text-[9px] text-orange-600 font-bold">유사:</span>{suggestions.map(s => (<button key={s} onClick={(e) => {e.stopPropagation(); handleAddressMapping(nick, s);}} className="bg-white border border-orange-200 text-orange-700 px-1.5 py-0.5 rounded text-[9px] hover:bg-orange-100 transition-colors shadow-sm">{s}</button>))}</div>)}
                                                 </div>
                                             )}
                                         </div>
                                     </div>
                                     <div className="flex flex-col gap-1 items-end text-right">
                                        <div className={`font-bold text-sm font-mono ${isPaidState && balance === 0 ? 'text-green-600' : (balance < 0 ? 'text-blue-600' : 'text-gray-800')}`}>{grandTotal.toLocaleString()}원</div>
                                        {isCard ? (
                                            <div className="flex flex-col items-end">
                                                <div className="text-[10px] text-purple-600 font-bold">
                                                    입금: {depositTotal.toLocaleString()} / 카드: {Math.max(0, balance).toLocaleString()}
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                {balance !== 0 && depositTotal > 0 && (<div className="text-[10px] text-gray-500">(입금: {depositTotal.toLocaleString()}원)</div>)}
                                                {balance > 0 && (<div className="text-[10px] font-bold text-red-500 mt-0.5">미납: {balance.toLocaleString()}원</div>)}
                                                {balance < 0 && (<div className="text-[10px] font-bold text-blue-600 mt-0.5">과납: {Math.abs(balance).toLocaleString()}원</div>)}
                                            </>
                                        )}
                                     </div>
                                 </div>
                                 <div className="p-1 space-y-1 bg-white">
                                    {items.map((item, idx) => { 
                                        const invItem = Array.isArray(inventory) ? inventory.find(i => i.name === item.product) : null;
                                        let stockBadge = null; 
                                        if (invItem) { 
                                            const totalOrdered = orders.filter(o => o.product === item.product && !o.isCancelled).reduce((sum, o) => sum + o.quantity, 0); 
                                            const remaining = invItem.stock - totalOrdered; 
                                            if (remaining < 0) stockBadge = <span className="text-red-500 font-bold text-[10px] ml-1 animate-pulse">(재고초과 {remaining})</span>; 
                                            else if (remaining === 0) stockBadge = <span className="text-red-500 font-bold text-[10px] ml-1">(품절)</span>; 
                                            else if (remaining <= 2) stockBadge = <span className="text-orange-500 font-bold text-[10px] ml-1">(마감임박 {remaining})</span>; 
                                        } 
                                        return (
                                            <div key={item.id} className={`flex justify-between items-center text-xs p-1 rounded group transition-colors ${item.isCancelled ? 'bg-red-50/80 border border-red-100' : 'hover:bg-gray-50'}`}>
                                                <div className="flex-1 flex gap-1 items-center">
                                                    {item.isCancelled && <span className="text-[9px] text-red-500 font-bold shrink-0">[취소]</span>}
                                                    <input 
                                                        id={`prod-input-${item.id}`}
                                                        type="text" 
                                                        list="product-list" 
                                                        value={item.product} 
                                                        onChange={(e) => handleProductChange(item.id, 'product', e.target.value)} 
                                                        onClick={(e) => e.stopPropagation()} 
                                                        onFocus={(e) => e.target.select()} 
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter') {
                                                                e.preventDefault();
                                                                const nextIdx = idx + 1;
                                                                if (nextIdx < items.length) {
                                                                    const nextInput = document.getElementById(`prod-input-${items[nextIdx].id}`);
                                                                    if (nextInput) nextInput.focus();
                                                                } else {
                                                                    addOrderLogic(nick, '', 1, true, item.id);
                                                                }
                                                            }
                                                        }}
                                                        className={`w-full outline-none px-1 rounded transition-colors ${item.isCancelled ? 'text-gray-400 line-through bg-transparent' : (item.isUnmodified ? 'text-blue-600 font-bold bg-blue-50 focus:bg-white focus:ring-1 focus:ring-blue-300' : 'bg-transparent focus:bg-white focus:ring-1 focus:ring-indigo-100')}`} 
                                                        placeholder="상품명" 
                                                        disabled={item.isCancelled} 
                                                    />
                                                    {stockBadge}
                                                </div>
                                                <div className="flex items-center gap-1">
                                                    <span onDoubleClick={(e) => { e.stopPropagation(); if (!item.isCancelled) setEditingQuantityId(item.id); }} className={`cursor-pointer font-bold px-1 rounded ${item.isCancelled ? 'cursor-not-allowed hover:bg-transparent line-through text-gray-400' : (item.isUnmodified ? 'text-blue-600 bg-blue-50 hover:bg-blue-100' : 'text-indigo-600 hover:bg-indigo-100')}`}>
                                                        {editingQuantityId === item.id ? (<input type="number" defaultValue={item.quantity} autoFocus onFocus={(e) => e.target.select()} className="w-8 text-center text-[10px] font-bold text-indigo-600 bg-white border border-indigo-300 rounded outline-none" onBlur={(e) => handleQuantityUpdate(item.id, e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleQuantityUpdate(item.id, e.currentTarget.value); }} onClick={(e) => e.stopPropagation()} />) : `${item.quantity}개`}
                                                    </span>
                                                    <input 
                                                        type="number" 
                                                        value={item.price} 
                                                        onChange={(e) => handleProductChange(item.id, 'price', e.target.value)} 
                                                        onClick={(e) => e.stopPropagation()} 
                                                        onFocus={(e) => e.target.select()} 
                                                        className={`w-14 text-right font-mono bg-transparent outline-none px-1 rounded ${item.isCancelled ? 'line-through text-gray-400' : (item.isUnmodified ? 'text-blue-500 font-bold bg-blue-50' : 'text-gray-500 focus:text-indigo-600')} ${Number(item.price) === 0 && !item.isCancelled ? 'bg-red-50 border-b border-red-300' : ''}`} 
                                                        disabled={item.isCancelled} 
                                                    />
                                                    <button onClick={(e)=>{e.stopPropagation(); handleOrderCancel(item.id);}} className={`ml-1 ${item.isCancelled ? "text-blue-500 hover:text-blue-700" : "text-gray-300 hover:text-red-500"}`} title={item.isCancelled ? "취소 철회" : "주문 취소"}><Icon name={item.isCancelled ? "arrow-u-up-left" : "prohibit"} weight="bold"/></button>
                                                    <button onClick={(e)=>{e.stopPropagation(); handleOrderDelete(item.id);}} className="text-gray-300 hover:text-red-500 ml-1"><Icon name="trash" weight="bold"/></button>
                                                </div>
                                            </div>
                                        ); 
                                    })}
                                </div>
                            </div>
                        );
                        })}
                        </div>
                    </div>
                </div>
             );
        };
        
        const OrderStatusTab = ({ orders, setOrders, setProductHistory, productHistory, inventory, setInventory }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [lastAddedId, setLastAddedId] = useState(null);

            const updateInventory = (id, field, val) => {
                setInventory(prev => prev.map(item => {
                    if (item.id === id) {
                        const next = { ...item, [field]: val };
                        if (field === 'price' && val > 0) setProductHistory(h => ({ ...h, [item.name]: val }));
                        return next;
                    }
                    return item;
                }));
            };

            const addInventoryRow = (afterId = null) => {
                const newId = `inv_${Date.now()}`;
                const newItem = { id: newId, name: '', stock: 0, price: 0 };
                setInventory(prev => {
                    if (!afterId) return [newItem, ...prev];
                    const idx = prev.findIndex(item => item.id === afterId);
                    const next = [...prev];
                    next.splice(idx + 1, 0, newItem);
                    return next;
                });
                setLastAddedId(newId);
            };

            useEffect(() => {
                if (lastAddedId) {
                    const input = document.getElementById(`inv-name-${lastAddedId}`);
                    if (input) { input.focus(); }
                    setLastAddedId(null);
                }
            }, [lastAddedId, inventory]);

            const productStats = useMemo(() => {
                const data = Array.isArray(inventory) ? inventory : [];
                return data.map(info => {
                    const totalOrdered = orders.filter(o => o.product === info.name && !o.isCancelled && info.name !== '').reduce((sum, o) => sum + o.quantity, 0);
                    return { ...info, totalOrdered, remaining: (info.stock || 0) - totalOrdered };
                }).filter(p => !searchTerm || p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [orders, inventory, searchTerm]);

            return (
                <div className="flex flex-col h-full bg-white rounded-lg shadow-sm border p-4 overflow-hidden">
                    <div className="flex justify-between items-center mb-4 pb-4 border-b">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="clipboard-text" weight="fill" className="text-indigo-600"/> 재고/발주 현황 <span className="text-sm font-normal text-gray-500">({productStats.length}종)</span></h2>
                        <div className="flex gap-2">
                            <button onClick={() => addInventoryRow()} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm">+ 새 상품 추가</button>
                            <button onClick={() => downloadExcel(productStats, '발주현황')} className="bg-green-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm"><Icon name="file-xls" weight="fill"/> 다운로드</button>
                        </div>
                    </div>
                    <div className="relative mb-2">
                        <Icon name="magnifying-glass" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                        <input type="text" placeholder="상품명 검색..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 border rounded py-2 text-sm outline-none focus:border-indigo-500" />
                    </div>
                    <div className="flex-1 overflow-y-auto border rounded">
                        <table className="w-full text-sm text-left border-collapse">
                            <thead className="bg-gray-100 text-gray-600 sticky top-0 z-10">
                                <tr>
                                    <th className="p-2 border-b w-[35%]">상품명</th>
                                    <th className="p-2 border-b text-right w-[15%]">단가</th>
                                    <th className="p-2 border-b text-center w-[12%]">주문수량</th>
                                    <th className="p-2 border-b text-center w-[12%]">총재고</th>
                                    <th className="p-2 border-b text-center w-[12%]">잔여</th>
                                    <th className="p-2 border-b w-10 text-center">삭제</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {productStats.map((p, idx) => (
                                    <tr key={p.id} className="hover:bg-indigo-50/30 transition-colors group">
                                        <td className="p-1">
                                            <input 
                                                id={`inv-name-${p.id}`}
                                                type="text" 
                                                value={p.name} 
                                                onChange={(e) => updateInventory(p.id, 'name', e.target.value)}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        e.preventDefault();
                                                        document.getElementById(`inv-price-${p.id}`).focus();
                                                    }
                                                }}
                                                className="w-full bg-transparent px-2 py-1 outline-none focus:bg-white focus:ring-1 ring-indigo-200 rounded font-bold text-gray-700"
                                            />
                                        </td>
                                        <td className="p-1 text-right">
                                            <input 
                                                id={`inv-price-${p.id}`}
                                                type="number" 
                                                value={p.price} 
                                                onChange={(e) => updateInventory(p.id, 'price', Number(e.target.value))}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        e.preventDefault();
                                                        document.getElementById(`inv-stock-${p.id}`).focus();
                                                    }
                                                }}
                                                className="w-full bg-transparent text-right py-1 outline-none font-mono focus:bg-white focus:ring-1 ring-indigo-200 rounded"
                                            />
                                        </td>
                                        <td className="p-1 text-center text-indigo-600 font-bold bg-gray-50/50">{p.totalOrdered}</td>
                                        <td className="p-1 text-center">
                                            <input 
                                                id={`inv-stock-${p.id}`}
                                                type="number" 
                                                value={p.stock} 
                                                onChange={(e) => updateInventory(p.id, 'stock', Number(e.target.value))}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        e.preventDefault();
                                                        if (idx + 1 < productStats.length) {

                    for(let i=1; i<data.length; i++) {

             return (

                         <div className="bg-indigo-50 p-2 rounded-lg border border-indigo-100 mb-2 grid grid-cols-6 gap-2 items-end"><div className="col-span-1"><input type="text" value={inputData.nickname} onChange={e=>setInputData({...inputData, nickname:e.target.value})} className="w-full border rounded px-1 py-1 text-xs" placeholder="닉네임"/></div><div className="col-span-1"><input type="text" value={inputData.realname} onChange={e=>setInputData({...inputData, realname:e.target.value})} className="w-full border rounded px-1 py-1 text-xs" placeholder="이름"/></div><div className="col-span-1"><input type="text" value={inputData.phone} onChange={e=>setInputData({...inputData, phone:e.target.value})} className="w-full border rounded px-1 py-1 text-xs" placeholder="연락처"/></div><div className="col-span-2 flex gap-1"><input type="text" value={inputData.address} onChange={e=>setInputData({...inputData, address:e.target.value})} className="flex-1 border rounded px-1 py-1 text-xs" placeholder="주소"/><button onClick={()=>handleAddressSearch(setInputData)} className="bg-slate-500 text-white px-1 rounded text-[10px]">검색</button></div><button onClick={handleAdd} className="bg-indigo-600 text-white px-2 py-1 rounded font-bold text-xs">추가</button></div>
                         <input type="text" placeholder="검색..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full border rounded px-2 py-1.5 text-xs mb-2 outline-none" />
                         <div className="flex-1 overflow-y-auto border rounded bg-white"><table className="w-full text-xs text-left"><thead className="bg-gray-100 text-gray-600 sticky top-0"><tr><th className="p-2 border-b w-24">닉네임</th><th className="p-2 border-b w-16">이름</th><th className="p-2 border-b w-24">연락처</th><th className="p-2 border-b">주소</th><th className="p-2 border-b w-10 text-center">관리</th></tr></thead><tbody className="divide-y">{filteredAddresses.map((addr, i) => (<tr key={i} className="hover:bg-gray-50" onDoubleClick={()=>startInlineEdit(addr)}>{inlineEditNick===addr.nickname?(<td className="p-2" colSpan="5"><div className="flex gap-1"><input value={inlineEditData.nickname} onChange={e=>setInlineEditData({...inlineEditData, nickname:e.target.value})} className="w-24 border rounded px-1 py-0.5"/><input value={inlineEditData.realname} onChange={e=>setInlineEditData({...inlineEditData, realname:e.target.value})} className="w-16 border rounded px-1 py-0.5"/><input value={inlineEditData.phone} onChange={e=>setInlineEditData({...inlineEditData, phone:e.target.value})} className="w-24 border rounded px-1 py-0.5"/><input value={inlineEditData.address} onChange={e=>setInlineEditData({...inlineEditData, address:e.target.value})} className="flex-1 border rounded px-1 py-0.5"/><button onClick={saveInlineEdit} className="text-blue-500 px-1"><Icon name="check" weight="bold"/></button></div></td>):(<><td className="p-2 font-bold text-indigo-700">{addr.nickname}</td><td className="p-2">{addr.realname}</td><td className="p-2">{addr.phone}</td><td className="p-2 text-gray-600 truncate max-w-xs">{addr.address}</td><td className="p-2 text-center"><button onClick={()=>handleDelete(addr.nickname)} className="text-red-400 hover:text-red-600"><Icon name="trash" weight="fill"/></button></td></>)}</tr>))}</tbody></table></div>
                     </div>
                     <div className="w-[30%] flex flex-col bg-white rounded-lg shadow-sm border p-4 overflow-hidden border-l-4 border-l-orange-200">
                         <h2 className="text-lg font-bold mb-4 text-orange-800"><Icon name="crown" weight="fill" className="text-yellow-500"/> VIP / 진상 관리</h2>
                         <div className="bg-orange-50 p-3 rounded-lg border border-orange-100 mb-4 flex flex-col gap-2"><div className="flex gap-2"><input type="text" placeholder="닉네임" value={scInput.nickname} onChange={e=>setScInput({...scInput, nickname: e.target.value})} className="flex-1 border rounded px-2 py-1.5 text-sm" /><select value={scInput.type} onChange={e=>setScInput({...scInput, type: e.target.value})} className="border rounded px-2 py-1.5 text-sm"><option value="vip">👑 VIP</option><option value="black">🚫 진상</option><option value="manager">🛡️ 관리자</option></select></div><input type="text" placeholder="메모" value={scInput.memo} onChange={e=>setScInput({...scInput, memo: e.target.value})} className="w-full border rounded px-2 py-1.5 text-sm" /><button onClick={handleAddSpecial} className="w-full bg-orange-600 hover:bg-orange-700 text-white py-1.5 rounded font-bold text-sm shadow-sm">등록하기</button></div>
                         <input type="text" placeholder="검색..." value={scSearch} onChange={e=>setScSearch(e.target.value)} className="w-full border rounded px-2 py-1.5 text-sm mb-2 outline-none" />
                         <div className="flex-1 overflow-y-auto border rounded bg-white"><ul className="divide-y">{filteredSpecial.map((item, i) => (<li key={i} className="p-3 flex justify-between items-center hover:bg-orange-50"><div><div className="flex items-center gap-2 mb-1"><span className={`px-1.5 rounded text-[10px] font-bold ${item.type==='vip'?'bg-yellow-300 text-yellow-900':item.type==='black'?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'}`}>{item.type==='vip'?'👑 VIP':item.type==='black'?'🚫 진상':'🛡️ 관리자'}</span><span className="font-bold text-sm text-gray-800">{item.nickname}</span></div><div className="text-xs text-gray-500">{item.memo}</div></div><button onClick={()=>handleDeleteSpecial(item.nickname)} className="text-gray-300 hover:text-red-500 p-1"><Icon name="trash" weight="fill"/></button></li>))}</ul></div>
                     </div>
                 </div>
             );
        };

        const CSTab = ({ csData, setCsData, openModal }) => { 
            const [lastAddedId, setLastAddedId] = useState(null);
            const updateCS = (id, field, value) => { setCsData(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item)); }; 
            const addCSBelow = (afterId = null) => {
                const newId = Date.now();
                const newItem = { id: newId, date: new Date().toISOString().split('T')[0], nickname: '', content: '', isResolved: false };
                setCsData(prev => {
                    if (!afterId) return [newItem, ...prev];
                    const idx = prev.findIndex(item => item.id === afterId);
                    const next = [...prev];
                    next.splice(idx + 1, 0, newItem);
                    return next;
                });
                setLastAddedId(newId);

                if (lastAddedId) {

            return (

                        <button onClick={() => addCSBelow()} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm">+ 상담 추가</button>
                    </div> 
                    <div className="flex-1 overflow-y-auto border rounded bg-white">

                            <thead className="bg-gray-100 text-gray-600 sticky top-0 z-10">
                                <tr>
                                    <th className="p-2 border-b w-28">날짜</th>
                                    <th className="p-2 border-b w-32">닉네임</th>
                                    <th className="p-2 border-b">내용</th>
                                    <th className="p-2 border-b w-16 text-center">완료</th>
                                    <th className="p-2 border-b w-12 text-center">삭제</th>
                                </tr>
                            </thead> 
                            <tbody className="divide-y"> 
                                {csData.map((item, idx) => ( 
                                    <tr key={item.id} className={`group hover:bg-gray-50 ${item.isResolved ? 'bg-gray-50 opacity-60' : ''}`}> 
                                        <td className="p-1">
                                            <input type="text" value={item.date.split('T')[0]} onChange={e=>updateCS(item.id, 'date', e.target.value)} className="w-full bg-transparent text-xs text-gray-400 outline-none px-1" />
                                        </td>

                                                className="w-full bg-transparent outline-none focus:bg-white focus:ring-1 ring-indigo-300 rounded px-1 font-bold text-indigo-700"

        const OrderManagementTab = ({ orders, shippingOverrides, quickShipping, addresses, handleExportBackup, handleImportBackup, addressMapping, cardPayments }) => {
            const findAddress = (nick) => {
                if (addressMapping[nick]) return addresses.find(a => normalizeString(a.nickname) === normalizeString(addressMapping[nick]));
                return addresses.find(a => normalizeString(a.nickname) === normalizeString(nick));
            };
            const handleExportProducts = () => { 
                const summary = {}; const unpaidSummary = {}; const paidSummary = {}; const customerPaidStatus = {}; const customerGroups = {};
                orders.forEach(o => { if(!customerGroups[o.customer]) customerGroups[o.customer] = []; customerGroups[o.customer].push(o); });
                const savedCardPayments = cardPayments || {}; const savedShippingOverrides = shippingOverrides || {};
                Object.entries(customerGroups).forEach(([nick, items]) => {
                    const activeItems = items.filter(i => !i.isCancelled); if(activeItems.length === 0) { customerPaidStatus[nick] = false; return; }
                    const isCard = savedCardPayments[nick]; const shipping = savedShippingOverrides[nick] !== undefined ? savedShippingOverrides[nick] : quickShipping;
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0);
                    const grandTotal = productTotal + shipping; customerPaidStatus[nick] = (depositTotal >= grandTotal) || isCard;
                });
                orders.forEach(o => { 
                    if(o.isCancelled) return; const name = o.product || '(상품명 없음)'; 
                    if (!summary[name]) summary[name] = 0; if (!paidSummary[name]) paidSummary[name] = 0; if (!unpaidSummary[name]) unpaidSummary[name] = 0;
                    summary[name] += Number(o.quantity); if (customerPaidStatus[o.customer]) paidSummary[name] += Number(o.quantity); else unpaidSummary[name] += Number(o.quantity);
                }); 
                const sortedKeys = Object.keys(summary).sort((a, b) => a.localeCompare(b, 'ko', { numeric: true }));
                const data = sortedKeys.map(product => ({ '상품명': product, '입금완료 수량': paidSummary[product] || 0, '미입금(노쇼) 수량': unpaidSummary[product] || 0 })); 
                downloadExcel(data, '상품별_발주리스트'); 
            };
            const handleExportCustomers = () => { 
                const groups = {}; orders.forEach(o => { if (!groups[o.customer]) groups[o.customer] = []; groups[o.customer].push(o); }); 
                let entries = Object.entries(groups).map(([nick, items]) => {
                    const activeItems = items.filter(i => !i.isCancelled); const isCard = cardPayments[nick]; 
                    const currentShipping = shippingOverrides[nick] !== undefined ? shippingOverrides[nick] : Number(quickShipping); 
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0); 
                    const grandTotal = productTotal + currentShipping; const isPaid = (depositTotal >= grandTotal) || isCard;
                    return { nick, items: activeItems, isPaid, depositTotal, grandTotal };
                });
                entries.sort((a, b) => { if (a.isPaid === b.isPaid) return a.nick.localeCompare(b.nick); return a.isPaid ? -1 : 1; });
                let excelRows = []; entries.forEach(({ nick, items, isPaid }) => { 
                    if(items.length === 0) return; const addrInfo = findAddress(nick) || {}; 
                    const fullAddress = addrInfo.zipcode ? `(${addrInfo.zipcode}) ${addrInfo.address || ''}` : (addrInfo.address || ''); 
                    const statusColumn = isPaid ? "" : "미입금";
                    const createRow = (productValue) => ({ '날짜시간': new Date().toLocaleString(), '공란1': '', '입금상태': statusColumn, '닉네임': nick, '주문제품(수량)': productValue, '이름': addrInfo.realname || '', '핸드폰번호': addrInfo.phone || '', '주소': fullAddress, '배송메모': addrInfo.memo || '' }); 
                    excelRows.push(createRow(`[ ${nick} ]`)); items.forEach(item => { const qtyPart = item.quantity > 1 ? ` ★ ${item.quantity}개` : ''; excelRows.push(createRow(`${item.product}${qtyPart}`)); }); 
                }); 
                downloadExcel(excelRows, '고객별_정산_배송리스트'); 
            };
            const handleExportUnpaid = () => {
                const groups = {}; orders.forEach(o => { if (!groups[o.customer]) groups[o.customer] = []; groups[o.customer].push(o); });
                const data = []; Object.entries(groups).forEach(([nick, items]) => {
                    if (cardPayments && cardPayments[nick]) return; 
                    const activeItems = items.filter(i => !i.isCancelled); if (activeItems.length === 0) return;
                    const currentShipping = shippingOverrides[nick] !== undefined ? shippingOverrides[nick] : Number(quickShipping);
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const grandTotal = productTotal + currentShipping;
                    const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0); const balance = grandTotal - depositTotal;
                    if (balance > 0) { 
                        const depositStatus = depositTotal > 0 ? `부분입금(${depositTotal.toLocaleString()}원)` : '미입금';
                        activeItems.forEach(item => {
                            const unitPrice = item.quantity > 0 ? item.price / item.quantity : 0;
                            const prodNameDisplay = item.quantity > 1 ? `${item.product} (${item.quantity}개)` : item.product;
                            data.push({ '닉네임': nick, '상품명': prodNameDisplay, '단가': unitPrice.toLocaleString(), '입금여부': depositStatus });
                        });
                    }
                });
                if (data.length === 0) { alert("미입금 내역이 없습니다."); return; }
                data.sort((a, b) => a['닉네임'].localeCompare(b['닉네임']));
                downloadExcel(data, '미입금자_상세리스트');
           };
           const fileInputRef = useRef(null); 
            return (
                <div className="flex flex-col items-center justify-center h-full p-10 gap-6 overflow-y-auto">
                    <div className="grid grid-cols-2 gap-6 w-full max-w-5xl"> 
                        <div className="bg-white p-6 rounded-xl shadow-lg border text-center">
                            <h2 className="text-lg font-bold mb-2">발주용 품목 집계</h2>
                            <button onClick={handleExportProducts} className="w-full bg-green-600 text-white font-bold py-2 rounded-lg">엑셀 다운로드</button>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-lg border text-center">
                            <h2 className="text-lg font-bold mb-2">배송용 고객 리스트 (전체)</h2>
                            <p className="text-gray-500 mb-2 text-xs">입금완료 상단 / 노쇼 하단 정렬</p>
                            <button onClick={handleExportCustomers} className="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">엑셀 다운로드</button>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-lg border text-center ring-2 ring-red-100">
                            <h2 className="text-lg font-bold mb-2 text-red-600">미입금자 상세 리스트</h2>
                            <p className="text-gray-500 mb-2 text-xs">상품별 한 줄씩 보기</p>
                            <button onClick={handleExportUnpaid} className="w-full bg-red-500 text-white font-bold py-2 rounded-lg">엑셀 다운로드</button>
                        </div>
                        <div className="bg-indigo-50 p-6 rounded-xl border border-indigo-200 text-center"><h2 className="text-lg font-bold mb-2 text-indigo-800">데이터 백업</h2><p className="text-gray-500 mb-2 text-xs">전체 데이터 저장/복구</p><div className="flex gap-2"><button onClick={handleExportBackup} className="flex-1 bg-indigo-600 text-white font-bold py-2 rounded-lg">저장</button><input type="file" ref={fileInputRef} onChange={handleImportBackup} className="hidden" /><button onClick={() => fileInputRef.current.click()} className="flex-1 bg-slate-500 text-white font-bold py-2 rounded-lg">복구</button></div></div>
                    </div>
                </div>
            );
        };
        const App = () => {
            const [orders, setOrders] = useLocalStorage('youtubeOrders', []);
            const [activeTab, setActiveTab] = useState('live');
            const [quickShipping, setQuickShipping] = useState(4000); 
            const [bankAccount, setBankAccount] = useLocalStorage('bankAccount', FIXED_BANK_ACCOUNT);
            const [productHistory, setProductHistory] = useLocalStorage('productHistory', {});
            const [shippingOverrides, setShippingOverrides] = useLocalStorage('shippingOverrides', {});
            const [addresses, setAddresses] = useLocalStorage('verifiedAddresses', []);
            const [cardPayments, setCardPayments] = useLocalStorage('cardPayments', {});
            const [csData, setCsData] = useLocalStorage('csHistory', []);
            const [matchedDeposits, setMatchedDeposits] = useState(() => { const saved = localStorage.getItem('matchedDeposits'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [depositorNames, setDepositorNames] = useLocalStorage('depositorNames', {});
            const [clickedChats, setClickedChats] = useState(() => { const saved = localStorage.getItem('clickedChats'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [keywords, setKeywords] = useState(() => { const saved = localStorage.getItem('keywords'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [sentAddressRequests, setSentAddressRequests] = useState(() => { const saved = localStorage.getItem('sentAddressRequests'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [deletedDepositIds, setDeletedDepositIds] = useState(() => { const saved = localStorage.getItem('deletedDepositIds'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [checkedOrders, setCheckedOrders] = useState(() => { const saved = localStorage.getItem('checkedOrders'); return saved ? new Set(JSON.parse(saved)) : new Set(); });
            const [addressMapping, setAddressMapping] = useLocalStorage('addressMapping', {});
            const [specialCustomers, setSpecialCustomers] = useLocalStorage('specialCustomers', {});
            const [inventory, setInventory] = useLocalStorage('productInventory', []);
            const [templateConfig, setTemplateConfig] = useLocalStorage('templateConfig', { emoji: '💙', paidMsg: '😍 완납 확인! 감사합니다 😍', unpaidPrefix: '[미입금]\n총 입금하실 금액\n👉', addrNotice: '※ 배송지 변경 시 채팅으로 변경할 주소를 남겨주세요!', surveyNotice: '방송마다 1회\n하단의 주문서(배송지입력) 필수!!\n\n이미 참여한 설문 일 경우\n▫ 답변 수정하기 \n▫ 또는 설문 추가 참여\n\n미입력이 많아 계속 안내합니다. \n양해부탁드립니다.' });
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [googleScriptUrl, setGoogleScriptUrl] = useLocalStorage('googleScriptUrl', DEFAULT_GOOGLE_SCRIPT_URL);
            const [customerSheetId, setCustomerSheetId] = useLocalStorage('customerSheetId', DEFAULT_CUSTOMER_SHEET_ID);
            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null, initialValue: '' });
            const openModal = (message, type = 'alert', onConfirm = null, onCancel = null, initialValue = '') => { setModalConfig({ isOpen: true, type, message, onConfirm: (val) => { if (onConfirm) onConfirm(val); setModalConfig(prev => ({ ...prev, isOpen: false })); }, onCancel: () => { if (onCancel) onCancel(); setModalConfig(prev => ({ ...prev, isOpen: false })); }, initialValue }); };
            useEffect(() => { localStorage.setItem('matchedDeposits', JSON.stringify([...matchedDeposits])); }, [matchedDeposits]);
            useEffect(() => { localStorage.setItem('clickedChats', JSON.stringify([...clickedChats])); }, [clickedChats]);
            useEffect(() => { localStorage.setItem('keywords', JSON.stringify([...keywords])); }, [keywords]);
            useEffect(() => { localStorage.setItem('sentAddressRequests', JSON.stringify([...sentAddressRequests])); }, [sentAddressRequests]);
            useEffect(() => { localStorage.setItem('deletedDepositIds', JSON.stringify([...deletedDepositIds])); }, [deletedDepositIds]);
            useEffect(() => { localStorage.setItem('checkedOrders', JSON.stringify([...checkedOrders])); }, [checkedOrders]);
            const resetAllStatus = () => {
                openModal("주문서, 채팅, 입금매칭 내역만 초기화됩니다.\n(주소록, VIP명단, 재고, 상품단가는 유지됩니다)", 'confirm', () => {
                    setOrders([]); setCardPayments({}); setShippingOverrides({}); setMatchedDeposits(new Set()); setClickedChats(new Set()); setSentAddressRequests(new Set()); setDeletedDepositIds(new Set()); setCheckedOrders(new Set());
                    ['youtubeOrders', 'cardPayments', 'shippingOverrides', 'matchedDeposits', 'clickedChats', 'sentAddressRequests', 'deletedDepositIds', 'checkedOrders'].forEach(k => localStorage.removeItem(k));
                    openModal("방송 데이터가 초기화되었습니다.\n(고객 정보와 재고는 안전하게 보존되었습니다.)", 'alert');
                });
            };
            const handleExportBackup = () => { const backupData = { date: new Date().toISOString(), orders, productHistory, shippingOverrides, cardPayments, matchedDeposits: [...matchedDeposits], clickedChats: [...clickedChats], sentAddressRequests: [...sentAddressRequests], deletedDepositIds: [...deletedDepositIds], checkedOrders: [...checkedOrders], addressMapping, specialCustomers, inventory, templateConfig, depositorNames, keywords: [...keywords] }; const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData)); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "kallo_backup_" + new Date().toISOString().slice(0,10) + ".json"); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); };
            const handleImportBackup = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const data = JSON.parse(event.target.result); openModal("백업 데이터를 불러오시겠습니까?", 'confirm', () => { if(data.orders) setOrders(data.orders); if(data.productHistory) setProductHistory(data.productHistory); if(data.shippingOverrides) setShippingOverrides(data.shippingOverrides); if(data.cardPayments) setCardPayments(data.cardPayments); if(data.matchedDeposits) setMatchedDeposits(new Set(data.matchedDeposits)); if(data.clickedChats) setClickedChats(new Set(data.clickedChats)); if(data.sentAddressRequests) setSentAddressRequests(new Set(data.sentAddressRequests)); if(data.deletedDepositIds) setDeletedDepositIds(new Set(data.deletedDepositIds)); if(data.checkedOrders) setCheckedOrders(new Set(data.checkedOrders)); if(data.addressMapping) setAddressMapping(data.addressMapping); if(data.specialCustomers) setSpecialCustomers(data.specialCustomers); if(data.inventory) setInventory(data.inventory); if(data.templateConfig) setTemplateConfig(data.templateConfig); if(data.depositorNames) setDepositorNames(data.depositorNames); if(data.keywords) setKeywords(new Set(data.keywords)); openModal("복구 완료!", 'alert'); }); } catch(err) { openModal("파일 읽기 실패", 'alert'); } }; reader.readAsText(file); e.target.value = ''; };
            return (
                <div className="flex flex-col h-screen overflow-hidden text-slate-700">
                     <header className="h-12 bg-indigo-900 text-white flex items-center justify-between px-4 shrink-0 shadow-md z-50">
                        <div className="font-bold text-lg flex items-center gap-2"><Icon name="lightning" className="text-yellow-400" weight="fill"/> 깔로 주문서 PRO</div>
                        <div className="flex items-center gap-2">
                            <div className="flex bg-indigo-800 rounded p-1 gap-1">
                                {[{ id: 'live', label: '라이브관제', icon: 'monitor-play' }, { id: 'status', label: '재고/발주', icon: 'clipboard-text' }, { id: 'customer', label: '고객관리', icon: 'address-book' }, { id: 'cs', label: 'CS관리', icon: 'headset' }, { id: 'manage', label: '주문관리(엑셀)', icon: 'file-xls' }].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-white text-indigo-900 shadow' : 'text-indigo-300 hover:text-white'}`}><Icon name={tab.icon} weight="bold"/> {tab.label}</button>
                                ))}
                            </div>
                            <button onClick={()=>setIsSettingsOpen(!isSettingsOpen)} className="p-2 hover:bg-indigo-800 rounded text-indigo-300 hover:text-white"><Icon name="gear" weight="fill" size={20}/></button>
                        </div>
                    </header>
                    <Modal isOpen={modalConfig.isOpen} type={modalConfig.type} message={modalConfig.message} onConfirm={modalConfig.onConfirm} onCancel={modalConfig.onCancel} initialValue={modalConfig.initialValue} />
                     {isSettingsOpen && (
                        <div className="absolute top-12 right-4 bg-white shadow-xl border rounded-lg p-4 w-96 z-50 animate-pop max-h-[80vh] overflow-y-auto">
                            <h3 className="font-bold mb-4 flex items-center gap-2 border-b pb-2"><Icon name="gear" weight="fill" className="text-gray-500"/> 환경설정</h3>
                            <div className="mb-4 space-y-4">
                                <div><label className="block text-xs font-bold text-indigo-600 mb-1">구글 앱스 스크립트 URL</label><input type="text" value={googleScriptUrl} onChange={(e)=>setGoogleScriptUrl(e.target.value)} className="w-full border rounded px-2 py-1.5 text-xs text-gray-600 font-mono break-all" /></div>
                                <div><label className="block text-xs font-bold text-green-600 mb-1">고객 주소록 시트 ID</label><input type="text" value={customerSheetId} onChange={(e)=>setCustomerSheetId(e.target.value)} className="w-full border rounded px-2 py-1.5 text-xs text-gray-600 font-mono" /></div>
                                <div><label className="block text-xs font-bold text-gray-500 mb-1">기본 배송비</label><input type="number" value={quickShipping} onChange={(e)=>setQuickShipping(Number(e.target.value))} className="w-full border rounded px-2 py-1.5 text-sm" /></div>
                                <div className="border-t pt-4"><h4 className="text-sm font-bold text-slate-800 mb-2 flex items-center gap-1"><Icon name="chat-text" weight="fill"/> 주문서 멘트 설정</h4><div className="space-y-3">
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">닉네임 이모지</label><input type="text" value={templateConfig.emoji} onChange={(e)=>setTemplateConfig({...templateConfig, emoji: e.target.value})} className="w-full border rounded px-2 py-1.5 text-sm" /></div>
                                    <div className="flex flex-wrap gap-1 bg-slate-50 p-1.5 rounded border border-slate-100">{["💙", "💖", "💛", "💚", "💜", "🤍", "⭐", "🌟", "✨", "🌸", "🌼", "🍀", "✅", "🎁", "📢", "🌈", "🔥", "💎"].map(em => (<button key={em} onClick={() => setTemplateConfig({...templateConfig, emoji: em})} className="w-5 h-5 flex items-center justify-center hover:bg-white rounded hover:shadow-sm transition-all text-xs">{em}</button>))}</div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">완납 메시지</label><input type="text" value={templateConfig.paidMsg} onChange={(e)=>setTemplateConfig({...templateConfig, paidMsg: e.target.value})} className="w-full border rounded px-2 py-1.5 text-sm" /></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">미납 안내</label><textarea value={templateConfig.unpaidPrefix} onChange={(e)=>setTemplateConfig({...templateConfig, unpaidPrefix: e.target.value})} className="w-full border rounded px-2 py-1.5 text-xs h-16 resize-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">계좌번호</label><textarea value={bankAccount} onChange={(e)=>setBankAccount(e.target.value)} className="w-full border rounded px-2 py-1.5 text-xs h-12 resize-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">주소 있음 안내</label><textarea value={templateConfig.addrNotice} onChange={(e)=>setTemplateConfig({...templateConfig, addrNotice: e.target.value})} className="w-full border rounded px-2 py-1.5 text-xs h-12 resize-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 mb-1">주소 없음 안내</label><textarea value={templateConfig.surveyNotice} onChange={(e)=>setTemplateConfig({...templateConfig, surveyNotice: e.target.value})} className="w-full border rounded px-2 py-1.5 text-xs h-24 resize-none" /></div>
                                </div></div>
                            </div>
                            <button onClick={()=>setIsSettingsOpen(false)} className="w-full bg-indigo-600 text-white rounded py-2 text-sm font-bold hover:bg-indigo-700 sticky bottom-0">저장 및 닫기</button>
                        </div>
                    )}
                     <main className="flex-1 overflow-hidden bg-gray-200 p-2 relative">
                        {activeTab === 'live' && <LiveTab {...{ orders, setOrders, productHistory, setProductHistory, quickShipping, shippingOverrides, setShippingOverrides, bankAccount, googleScriptUrl, addresses, cardPayments, setCardPayments, resetAllStatus, matchedDeposits, setMatchedDeposits, depositorNames, setDepositorNames, clickedChats, setClickedChats, openModal, keywords, setKeywords, sentAddressRequests, setSentAddressRequests, deletedDepositIds, setDeletedDepositIds, checkedOrders, setCheckedOrders, addressMapping, setAddressMapping, templateConfig, specialCustomers, inventory, setInventory }} />}
                        {activeTab === 'status' && <OrderStatusTab {...{ orders, setOrders, setProductHistory, productHistory, inventory, setInventory }} />}
                        {activeTab === 'customer' && <CustomerTab {...{ addresses, setAddresses, googleScriptUrl, customerSheetId, openModal, specialCustomers, setSpecialCustomers }} />}
                        {activeTab === 'cs' && <CSTab {...{ csData, setCsData, openModal }} />}
                        {activeTab === 'manage' && <OrderManagementTab {...{ orders, shippingOverrides, quickShipping, addresses, handleExportBackup, handleImportBackup, addressMapping, cardPayments }} />}
                     </main>
                </div>
             )
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
