<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBER OFFICIAL LINEUP</title>
    <!-- 디자인(Tailwind CSS)을 불러오는 코드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 리액트(React)를 웹에서 바로 실행하게 해주는 코드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 최신 문법 지원을 위해 Babel 버전을 최신(@babel/standalone)으로 업데이트 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 주문서와 동일한 폰트 및 스타일 적용 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f3f4f6; 
            color: #111827; 
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .break-keep { word-break: keep-all; }
        
        /* 시크한 입력창 스타일 */
        .input-chic {
            border-radius: 0;
            border: 1px solid #d1d5db;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }
        .input-chic:focus {
            border-color: #000000;
            background-color: #ffffff;
            box-shadow: none;
            outline: none;
        }

        /* 스크롤바 커스텀 (깔끔하게) */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아주 심플하고 얇은 검색 아이콘
        const SearchIcon = ({ size = 18 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );

        function App() {
          const [allProducts, setAllProducts] = useState([]);
          const [products, setProducts] = useState([]);
          const [searchTerm, setSearchTerm] = useState("");
          const [toastMessage, setToastMessage] = useState("");
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            const fetchSheetData = async () => {
              try {
                const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5i3ao2qfH8pe0kMYBxAzmzftmbi2QnxlkzUDm-caT-EG4UOYIE84iA5TwJGH9Sd-_TRLlT5f84GE6/pub?gid=1287250952&single=true&output=csv";
                const response = await fetch(csvUrl);
                const text = await response.text();
                
                const rows = text.replace(/\r/g, '').split('\n');
                let data = [];
                
                rows.forEach((row, index) => {
                  const cleanRow = row.trim();
                  if (!cleanRow) return;
                  
                  const cols = [];
                  let current = '';
                  let inQuotes = false;
                  
                  for (let i = 0; i < cleanRow.length; i++) {
                    if (cleanRow[i] === '"') {
                      inQuotes = !inQuotes;
                    } else if (cleanRow[i] === ',' && !inQuotes) {
                      cols.push(current.trim());
                      current = '';
                    } else {
                      current += cleanRow[i];
                    }
                  }
                  cols.push(current.trim());
                  
                  if (cols[0] && cols[0] !== "상품명" && cols[0] !== "단가") {
                    data.push({
                      id: index,
                      name: cols[0],
                      price: cols[1] || '' 
                    });
                  }
                });

                // 번호 기준 내림차순 정렬 (5 -> 4 -> 3 -> 2 -> 1)
                data.sort((a, b) => {
                  const matchA = a.name.match(/^(\d+)/);
                  const numA = matchA ? parseInt(matchA[0]) : 0;
                  
                  const matchB = b.name.match(/^(\d+)/);
                  const numB = matchB ? parseInt(matchB[0]) : 0;
                  
                  return numB - numA;
                });
                
                setAllProducts(data);
                setProducts(data);
                setIsLoading(false);
              } catch (error) {
                console.error("데이터를 불러오는데 실패했습니다.", error);
                setIsLoading(false);
              }
            };

            fetchSheetData();
          }, []);

          useEffect(() => {
            let filtered = allProducts;
            if (searchTerm) {
              filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(searchTerm.toLowerCase())
              );
            }
            setProducts(filtered);
          }, [searchTerm, allProducts]);

          const handleCopy = (product) => {
            const cleanPrice = product.price.replace(/[^0-9,]/g, '');
            const textToCopy = `${product.name} ${cleanPrice}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setToastMessage(`복사 완료: ${product.name}`);
              setTimeout(() => {
                setToastMessage("");
              }, 2000);
            } catch (err) {
              console.error('복사 실패', err);
            }
            document.body.removeChild(textArea);
          };

          return (
            <div className="flex justify-center min-h-screen">
              <div className="w-full max-w-md bg-white min-h-screen relative flex flex-col shadow-2xl sm:my-10 sm:min-h-[800px] sm:rounded-none">
                
                {/* 상단 블랙 헤더로 변경 */}
                <header className="py-8 text-center bg-black flex-shrink-0 sticky top-0 z-20">
                  <h1 className="text-2xl font-serif text-white tracking-[0.25em] ml-1 uppercase">EMBER</h1>
                  <p className="text-[10px] text-gray-400 tracking-[0.2em] uppercase mt-1">Official Lineup</p>
                </header>

                <main className="flex-1 flex flex-col bg-white">
                  
                  <div className="px-5 py-6 border-b border-gray-100">
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <SearchIcon className="text-gray-400" />
                      </div>
                      <input
                        type="text"
                        id="search"
                        placeholder="상품명 또는 번호를 검색하세요"
                        className="w-full pl-11 pr-4 py-3.5 input-chic text-sm font-medium tracking-wide text-black placeholder-gray-400"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto">
                    {isLoading ? (
                      <div className="text-center py-20 text-gray-400 text-sm font-medium tracking-wider uppercase">
                        Loading...
                      </div>
                    ) : products.length > 0 ? (
                      <ul className="divide-y divide-gray-200">
                        {products.map((product, index) => {
                          const cleanPrice = product.price.replace(/[^0-9,]/g, '');

                          return (
                            <li 
                              key={product.id} 
                              /* 줄별로 배경색 교차 (지브라 패턴) 적용 */
                              className={`flex items-center justify-between py-4 px-5 transition-colors group ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}
                            >
                              <div className="flex items-center gap-3 pr-4">
                                <span className="text-[14px] font-medium text-black leading-snug break-keep tracking-wide">
                                  {product.name}
                                </span>
                              </div>
                              
                              <div className="flex items-center gap-4 shrink-0">
                                <div className="text-[15px] font-bold text-black font-serif tracking-wider">
                                  {cleanPrice}
                                </div>
                                <button 
                                  onClick={() => handleCopy(product)}
                                  className="border border-black text-black px-3 py-1.5 text-[10px] font-bold tracking-widest uppercase hover:bg-black hover:text-white transition-all bg-white flex items-center justify-center active:scale-95"
                                >
                                  Copy
                                </button>
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    ) : (
                      <div className="text-center py-20 text-gray-400 text-sm tracking-wide">
                        검색 결과가 없습니다.
                      </div>
                    )}
                  </div>
                  
                  <footer className="py-8 text-center text-gray-400 text-[10px] border-t border-gray-100 bg-white uppercase tracking-widest mt-auto">
                      <p className="mb-1">Ember Sister Official</p>
                      <p>System by. 깔로</p>
                  </footer>
                </main>

                {/* 복사 알림 토스트 */}
                {toastMessage && (
                  <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-black text-white px-6 py-3 text-[11px] font-bold tracking-widest shadow-2xl z-50 whitespace-nowrap animate-fade-in border border-white/10">
                    {toastMessage}
                  </div>
                )}
                
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
